listener {
    timeout = 300                                                   # 5min.
    on-timeout = brightnessctl -s set 10                            # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                                    # monitor backlight restore.
}

listener { 
    timeout = 150                                                   # 2.5min.
    on-timeout = brightnessctl -sd platform::kbd_backlight set 0    # turn off keyboard backlight.
    on-resume = brightnessctl -rd platform::kbd_backlight           # turn on keyboard backlight.
}

listener {
    timeout = 600                                                   # 10min.
    on-timeout = pgrep -f "qs -p ~/.config/dots/qs/lockscreen/lock.qml" || qs -p ~/.config/dots/qs/lockscreen/lock.qml                       # lock screen when timeout has passed
}

general {
    lock_cmd = pgrep -f "qs -p ~/.config/dots/qs/lockscreen/lock.qml" || qs -p ~/.config/dots/qs/lockscreen/lock.qml
    unlock_cmd = pkill -f "qs -p ~/.config/dots/qs/lockscreen/lock.qml"
    before_sleep_cmd = pgrep -f "qs -p ~/.config/dots/qs/lockscreen/lock.qml" || qs -p ~/.config/dots/qs/lockscreen/lock.qml
}
